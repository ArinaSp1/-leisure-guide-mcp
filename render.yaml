services:
  - type: web
    name: leisure-guide-mcp
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile --ignore-scripts && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 22.17.0
